<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenSync Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial Narrow Bold', sans-serif;
            background: #05080c;
            color: #ffffff;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app {
            width: 100%;
            max-width: 390px;
            padding: 28px 20px 40px;
            box-sizing: border-box;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-top: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 1px;
        }

        .header h1 span {
            color: #95f8ba;
        }

        .subtitle {
            margin-top: 8px;
            color: #8b8b8b;
            font-size: 16px;
        }

        /* SECTION TITLES */
        .section-title {
            text-align: center;
            color: #a6ffb9;
            font-size: 18px;
            margin-top: 70px;
            margin-bottom: 25px;
        }

        /* CIRCLE */
        .circle-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: auto;
        }

        svg {
            transform: rotate(-90deg);
        }

        .bg-circle {
            fill: none;
            stroke: #080b0f;
            stroke-width: 26;
        }

        .progress {
            fill: none;
            stroke: url(#grad);
            stroke-width: 26;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px #95f8ba);
            transition: stroke-dashoffset 0.8s ease;
        }

        .circle-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .percent {
            font-size: 40px;
            color: #6fff8c;
            font-weight: bold;
            line-height: 1;
        }

        .label {
            margin-top: 10px;
            color: #9d9d9d;
            font-size: 18px;
        }

        /* CARD */
        .card {
            margin-top: 20px;
            border: 3px solid #c6f2ff;
            border-radius: 34px;
            padding: 28px 24px 30px;
            background: rgba(255, 255, 255, 0.02);
        }

        .duration-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .duration-label {
            color: #8c8c8c;
            font-size: 16px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .controls button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
        }

        #duration {
            min-width: 30px;
            height: 36px;
            background: #0d0d0d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .start-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 28px;
        }

        .start {
            padding: 12px 34px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, #c6f2ff, #7cff7c);
            color: #2a3560;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(149, 248, 186, 0.25);
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <div class="header">
            <h1><span>Green</span>Sync</h1>
            <div class="subtitle">Watering System Assistant</div>
        </div>

        <!-- SOIL -->
        <div class="section-title">Soil Moisture Level</div>

        <div class="circle-wrapper">

            <svg width="280" height="280">
                <defs>
                    <linearGradient id="grad">
                        <stop offset="0%" stop-color="#d4fbe4" />
                        <stop offset="100%" stop-color="#78ff7b" />
                    </linearGradient>
                </defs>

                <circle class="bg-circle" cx="140" cy="140" r="110" />

                <circle id="progressCircle" class="progress" cx="140" cy="140" r="110" stroke-dasharray="691"
                    stroke-dashoffset="691" />
            </svg>

            <div class="circle-text">
                <div id="percentText" class="percent">0%</div>
                <div id="statusLabel" class="label">Dry</div>
            </div>
        </div>

        <!-- MANUAL -->
        <div class="section-title">Manual Watering</div>

        <div class="card">

            <div class="duration-row">

                <div class="duration-label">
                    Duration (s)
                </div>

                <div class="controls">
                    <button id="minusBtn">⊖</button>

                    <div id="duration">0</div>

                    <button id="plusBtn">⊕</button>
                </div>

            </div>

            <div class="start-wrapper">
                <button class="start">Start</button>
            </div>

        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjmiue5jYLiWCkPnjca9h6Xz3_9HihuFg",
            authDomain: "greensync-bc112.firebaseapp.com",
            databaseURL: "https://greensync-bc112-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "greensync-bc112",
            storageBucket: "greensync-bc112.firebasestorage.app",
            messagingSenderId: "1083049987837",
            appId: "1:1083049987837:web:814e2751ad9bc3e573b894",
            measurementId: "G-PVXH1R31G5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Circle setup
        const circle = document.getElementById("progressCircle");
        const text = document.getElementById("percentText");
        const statusLabel = document.getElementById("statusLabel");

        const radius = 110;
        const circumference = 2 * Math.PI * radius;

        // Firebase listener
        const moistureRef = ref(db, "kelembapan_persen");

        onValue(moistureRef, (snapshot) => {
            const value = snapshot.val() || 0;

            const percent = Math.max(0, Math.min(100, value));

            text.innerText = percent.toFixed(1) + "%";

            if (percent < 40) {
                statusLabel.innerText = "Dry";
                text.style.color = "#d1473d";
            } else if (percent < 60) {
                statusLabel.innerText = "Moist";
                text.style.color = "#f5c06c";
            } else if (percent < 80) {
                statusLabel.innerText = "Moist";
                text.style.color = "#6fff8c";
            } else {
                statusLabel.innerText = "Wet";
                text.style.color = "#7fdcff";
            }

            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        });

        // Manual Watering Duration
        const minusBtn = document.getElementById("minusBtn");
        const plusBtn = document.getElementById("plusBtn");
        const durationText = document.getElementById("duration");

        let durationValue = 0;

        const durationRef = ref(db, "manual_duration");

        onValue(durationRef, (snapshot) => {
            const val = snapshot.val();

            if (val !== null) {
                durationValue = val;
                durationText.innerText = durationValue;
            }
        });

        const updateDuration = (newVal) => {
            if (newVal >= 0) {
                set(durationRef, newVal);
            }
        };

        minusBtn.addEventListener("click", () => updateDuration(durationValue - 1));
        plusBtn.addEventListener("click", () => updateDuration(durationValue + 1));
    </script>

</body>

</html>
